<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Infância</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #eaddcf; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px; /* Reduzi o padding para ganhar espaço */
            margin: 0;
            min-height: 100vh;
        }

        .app-container {
            background-color: #fffaf5;
            width: 100%;
            /* No PC ele respeita 550px, no celular ele ocupa 95% da tela */
            max-width: 500px; 
            padding: 30px 15px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #d7ccc8;
            box-sizing: border-box; /* Importante para não vazar a borda */
        }

        header { margin-bottom: 25px; }

        .logo-placeholder {
            width: 180px; /* Ajustei para não ficar gigante no celular */
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent !important;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 1.6rem; /* Diminuí um pouco a fonte */
            color: #d35400;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            margin-top: 5px;
            color: #8d6e63;
            font-style: italic;
            font-size: 0.85rem;
        }

        .produto {
            background: white;
            margin: 12px auto;
            padding: 10px;
            border-radius: 12px;
            border-left: 6px solid #f39c12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .info-produto {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .foto-empada {
            width: 55px;
            height: 55px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #f3e5d8;
        }

        .produto span {
            font-weight: bold;
            color: #4e342e;
            font-size: 0.85rem;
            line-height: 1.2;
        }

        input[type="number"] {
            width: 40px;
            padding: 6px;
            border: 2px solid #eee;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        /* CHECKOUT MOBILE */
        .checkout-container {
            background: white;
            margin: 20px auto;
            padding: 15px;
            border-radius: 15px;
            text-align: left;
            border: 1px solid #eee;
        }

        .checkout-container h3 {
            color: #d35400;
            margin-top: 0;
            font-size: 1rem;
        }

        .checkout-container input, .checkout-container select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%; /* Botão ocupa a largura total no celular */
            box-shadow: 0 8px 15px rgba(46, 204, 113, 0.2);
        }

        footer { margin-top: 25px; font-size: 0.75rem; color: #bcaaa4; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-placeholder">
                <img src="vovo_final.png.png" alt="Logo Sabor de Infância">
            </div>
            <h1>Sabor de Infância</h1>
            <p class="subtitle">Empadinhas Artesanais</p>
        </header>

        <div class="produto">
            <div class="info-produto">
               <img src="doce.png" class="foto-empada">
                <span>Empadinha de Leite condensado - R$ 5,00</span>
            </div>
            <input type="number" id="qtd_empadas" value="0" min="0">
        </div>

        <div class="produto">
            <div class="info-produto">
                <img src="doce.png" class="foto-empada">
                <span>Kit 4 empadinhas - R$ 15,00</span>
            </div>
            <input type="number" id="qtd_kit" value="0" min="0">
        </div>

        <div class="checkout-container">
            <h3>Dados para Entrega</h3>
            <input type="text" id="nome_cliente" placeholder="Seu Nome completo">
            <input type="text" id="endereco" placeholder="Rua, número e bairro">
            <input type="text" id="referencia" placeholder="Ponto de referência">
            
            <select id="pagamento">
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão">Cartão</option>
            </select>
        </div>

        <button onclick="finalizar()">Enviar Pedido pelo WhatsApp</button>

        <footer>© 2026 Sabor de Infância - Serra, ES</footer>
    </div>

    <script>
        function finalizar() {
            const telefone = "5527981130000"; 
            const qtdLeite = document.getElementById('qtd_empadas').value;
            const qtdKit = document.getElementById('qtd_kit').value;
            const nome = document.getElementById('nome_cliente').value;
            const endereco = document.getElementById('endereco').value;
            const ref = document.getElementById('referencia').value;
            const pgto = document.getElementById('pagamento').value;

            if (qtdLeite == 0 && qtdKit == 0) {
                alert("Selecione pelo menos um item!");
                return;
            }

            if (!nome || !endereco) {
                alert("Preencha seu nome e endereço!");
                return;
            }

            let mensagem = `*NOVO PEDIDO - SABOR DE INFÂNCIA*\n\n`;
            mensagem += `👤 *Cliente:* ${nome}\n`;
            mensagem += `📍 *Endereço:* ${endereco}\n`;
            if (ref) mensagem += `📍 *Ref:* ${ref}\n`;
            mensagem += `💳 *Pagamento:* ${pgto}\n\n`;
            mensagem += `--- *ITENS* ---\n`;
            if (qtdLeite > 0) mensagem += `• ${qtdLeite}x Empadinha de Leite Condensado\n`;
            if (qtdKit > 0) mensagem += `• ${qtdKit}x Kit 4 empadinhas\n`;

            const linkWhatsApp = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;
            window.open(linkWhatsApp, '_blank');
        }
    </script>

</body>
</html>
