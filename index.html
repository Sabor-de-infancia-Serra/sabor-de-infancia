<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Infância - Delivery</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #eaddcf; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 10px;
            margin: 0;
            min-height: 100vh;
        }

        .app-container {
            background-color: #fffaf5;
            width: 100%;
            max-width: 550px;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            border: 1px solid #d7ccc8;
            box-sizing: border-box;
        }

        header { margin-bottom: 30px; }

        .logo-placeholder {
            width: 180px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent !important;
            border: none !important;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            color: #d35400;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-top: 5px;
            color: #8d6e63;
            font-style: italic;
            font-size: 0.9rem;
        }

        .produto {
            background: white;
            margin: 15px auto;
            padding: 12px 15px;
            border-radius: 15px;
            border-left: 8px solid #f39c12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            min-height: 110px;
        }

        .produto:hover {
            transform: translateY(-3px);
            border-left-color: #d35400;
        }

        .info-produto {
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            flex: 1;
        }

        .foto-empada {
            width: 65px;
            height: 65px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #f3e5d8;
            border: 1px solid #eee;
        }

        .texto-produto {
            display: flex;
            flex-direction: column;
        }

        .nome-item {
            font-weight: bold;
            color: #4e342e;
            font-size: 0.95rem;
        }

        .preco-item {
            color: #d35400;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 4px;
        }

        input[type="number"] {
            width: 45px;
            padding: 8px;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: #4e342e;
            outline: none;
        }

        .checkout-container {
            background: white;
            margin: 25px auto;
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .checkout-container h3 {
            color: #d35400;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkout-container input, .checkout-container select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            background-color: #fdfdfd;
            color: #4e342e;
            outline: none;
        }

        .checkout-container input:focus {
            border-color: #f39c12;
        }

        .pagamento-label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #8d6e63;
            font-size: 0.9rem;
        }

        button {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            box-shadow: 0 15px 25px rgba(46, 204, 113, 0.4);
            transform: scale(1.03);
        }

        footer { margin-top: 30px; font-size: 0.8rem; color: #bcaaa4; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-placeholder">
                <img src="logo_nova.png" alt="Logo Sabor de Infância">
            </div>
            <h1>Delivery</h1>
            <p class="subtitle">Empadinhas Artesanais</p>
        </header>

        <div class="produto">
            <div class="info-produto">
               <img src="kit_4_empadas.png" class="foto-empada">
               <div class="texto-produto">
                   <span class="nome-item">Kit Base (4 Empadinhas)</span>
                   <span class="preco-item">R$ 12,00</span>
               </div>
            </div>
            <input type="number" id="qtd_base" value="0" min="0">
        </div>

        <div class="produto">
            <div class="info-produto">
                <img src="kit_6_empadas.png" class="foto-empada">
                <div class="texto-produto">
                    <span class="nome-item">Kit Lanche (6 Empadinhas)</span>
                    <span class="preco-item">R$ 16,90</span>
                </div>
            </div>
            <input type="number" id="qtd_lanche" value="0" min="0">
        </div>

        <div class="produto">
            <div class="info-produto">
                <img src="kit_10_empadas.png" class="foto-empada">
                <div class="texto-produto">
                    <span class="nome-item">Kit Família (10 Empadinhas)</span>
                    <span class="preco-item">R$ 25,00</span>
                </div>
            </div>
            <input type="number" id="qtd_familia" value="0" min="0">
        </div>

        <div class="checkout-container">
            <h3>Dados para Entrega</h3>
            <input type="text" id="nome_cliente" placeholder="Nome completo">
            <input type="text" id="condominio" placeholder="Nome do Condomínio">
            <input type="text" id="casa_apto" placeholder="Nº da Casa ou Apartamento">
            <input type="text" id="complemento" placeholder="Complemento (Ex: Bloco, andar)">
            
            <label class="pagamento-label">Forma de Pagamento:</label>
            <select id="pagamento">
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro (Levar troco)</option>
                <option value="PicPay">PicPay</option>
            </select>
        </div>

        <button onclick="finalizar()">Enviar Pedido pelo WhatsApp</button>

        <footer>© 2026 Sabor de Infância - Serra, ES</footer>
    </div>

    <script>
        function finalizar() {
            const telefone = "5527981130000"; 
            
            const qtdBase = document.getElementById('qtd_base').value;
            const qtdLanche = document.getElementById('qtd_lanche').value;
            const qtdFamilia = document.getElementById('qtd_familia').value;
            
            const nome = document.getElementById('nome_cliente').value;
            const condominio = document.getElementById('condominio').value;
            const casa = document.getElementById('casa_apto').value;
            const complemento = document.getElementById('complemento').value;
            const pgto = document.getElementById('pagamento').value;

            if (qtdBase == 0 && qtdLanche == 0 && qtdFamilia == 0) {
                alert("Por favor, selecione a quantidade de pelo menos um item.");
                return;
            }

            if (!nome || !condominio || !casa) {
                alert("Por favor, preencha nome, condomínio e número da casa/apto!");
                return;
            }

            let mensagem = `*NOVO PEDIDO - SABOR DE INFÂNCIA*\n\n`;
            mensagem += `👤 *Cliente:* ${nome}\n`;
            mensagem += `🏢 *Condomínio:* ${condominio}\n`;
            mensagem += `🏠 *Nº:* ${casa}\n`;
            if (complemento) mensagem += `📍 *Comp:* ${complemento}\n`;
            mensagem += `💳 *Pagamento:* ${pgto}\n\n`;
            
            mensagem += `--- *ITENS DO PEDIDO* ---\n`;
            if (qtdBase > 0) mensagem += `• ${qtdBase}x Kit Base (4 empadinhas)\n`;
            if (qtdLanche > 0) mensagem += `• ${qtdLanche}x Kit Lanche (6 empadinhas)\n`;
            if (qtdFamilia > 0) mensagem += `• ${qtdFamilia}x Kit Família (10 empadinhas)\n`;

            const linkWhatsApp = `https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;
            window.open(linkWhatsApp, '_blank');
        }
    </script>

</body>
</html>
