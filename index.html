<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Infância - Delivery</title>
    <meta name="description" content="Delivery de empadas artesanais Sabor de Infância em Serra, ES. Doces recordações em cada mordida.">
    <style>
        :root {
            --primary: #d35400;
            --primary-light: #fff3e0;
            --secondary: #27ae60;
            --text: #4e342e;
            --bg: #eaddcf;
            --card: #fffaf5;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(211, 84, 0, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(39, 174, 96, 0.05) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
            margin: 0;
            min-height: 100vh;
            color: var(--text);
        }

        /* ===== MOBILE (default) — IDÊNTICO AO ORIGINAL ===== */
        .app-container {
            background-color: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 30px 15px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            border: 1px solid #d7ccc8;
            overflow: hidden;
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #d7ccc8;
        }

        .logo-placeholder img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .subtitle {
            margin-top: 5px;
            color: #8d6e63;
            font-style: italic;
            font-size: 0.85rem;
        }

        .produto {
            background: white;
            margin: 15px auto;
            padding: 15px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: transform 0.3s;
            border: 1px solid #fdf2e9;
            gap: 10px;
        }

        .produto:hover { transform: translateY(-2px); }

        .info-produto {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .foto-empada {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            background: #fdf2e9;
        }

        .nome-item {
            display: block;
            font-weight: 700;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .preco-item {
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 50px;
        }

        .btn-qty {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-qty:active { transform: scale(0.9); }

        .qty-value {
            font-weight: bold;
            min-width: 20px;
            color: var(--text);
            text-align: center;
        }

        .total-box {
            background: var(--primary-light);
            color: var(--text);
            margin: 25px 0;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px dashed var(--primary);
            font-weight: 700;
            letter-spacing: 1px;
        }

        #valor_total_exibido {
            color: var(--secondary);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .checkout-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            margin: 20px 0;
            padding: 25px 20px;
            border-radius: 30px;
            text-align: left;
            border: 1px solid white;
        }

        .checkout-container h3 {
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .tipo-endereco-container {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px;
        }

        .btn-tipo {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: var(--text);
            transition: all 0.3s;
        }

        .btn-tipo.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .endereco-campos { display: none; animation: fadeIn 0.4s ease-in; }
        .endereco-campos.show { display: block; }

        .checkout-container input,
        .checkout-container select,
        .checkout-container textarea {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: white;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .checkout-container input:focus,
        .checkout-container select:focus,
        .checkout-container textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(211, 84, 0, 0.1);
        }

        #box_troco { display: none; margin-top: 5px; animation: fadeIn 0.3s ease-in; }
        #box_troco.show { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button.btn-finalizar {
            background: linear-gradient(135deg, var(--secondary), #2ecc71);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
            transition: all 0.2s;
            border-bottom: 4px solid #1e8449;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-finalizar:hover { filter: brightness(1.05); }
        button.btn-finalizar:active { transform: translateY(4px); border-bottom: 0; }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #bcaaa4;
        }

        /* ===== TABLET (≥768px) ===== */
        @media (min-width: 768px) {
            body { padding: 40px 20px; }
            .app-container { max-width: 640px; padding: 40px 30px; }
            .foto-empada { width: 80px; height: 80px; }
            .nome-item { font-size: 1.05rem; }
            h1 { font-size: 1.8rem; }
        }

        /* ===== DESKTOP (≥1024px) — LAYOUT 2 COLUNAS ===== */
        @media (min-width: 1024px) {
            body { padding: 50px 30px; align-items: center; }

            .app-container {
                max-width: 1100px;
                padding: 50px 50px;
                border-radius: 50px;
                text-align: left;
            }

            header { text-align: center; margin-bottom: 40px; }
            .logo-placeholder img { width: 170px; }
            h1 { font-size: 2.2rem; letter-spacing: 5px; }
            .subtitle { font-size: 1rem; }

            /* Layout grid de 2 colunas */
            .main-grid {
                display: grid;
                grid-template-columns: 1.3fr 1fr;
                gap: 40px;
                align-items: start;
            }

            .coluna-cardapio h2,
            .coluna-pedido h2 {
                color: var(--primary);
                text-transform: uppercase;
                letter-spacing: 3px;
                font-size: 1.1rem;
                margin: 0 0 15px;
                font-weight: bold;
            }

            /* Cards de produto maiores no desktop */
            .produto {
                padding: 20px;
                margin: 12px 0;
                border-radius: 28px;
            }
            .foto-empada { width: 95px; height: 95px; border-radius: 22px; }
            .nome-item { font-size: 1.15rem; margin-bottom: 6px; }
            .preco-item { font-size: 1.15rem; }
            .info-produto { gap: 18px; }

            /* Coluna direita sticky */
            .coluna-pedido {
                position: sticky;
                top: 30px;
            }

            .total-box { margin: 0 0 20px; padding: 22px 25px; }
            #valor_total_exibido { font-size: 1.7rem; }

            .checkout-container { margin: 0 0 20px; padding: 28px; }
            .checkout-container h3 { font-size: 1.3rem; margin-bottom: 18px; }

            footer { text-align: center; margin-top: 40px; }
        }

        /* ===== DESKTOP GRANDE (≥1280px) ===== */
        @media (min-width: 1280px) {
            .app-container { max-width: 1200px; padding: 60px; }
            .main-grid { gap: 50px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-placeholder">
                <!-- TROQUE PELA URL DA SUA LOGO -->
                <img src="https://via.placeholder.com/140x140/fff3e0/d35400?text=LOGO" alt="Sabor de Infância">
            </div>
            <h1>Delivery</h1>
            <p class="subtitle">Doces Recordações em cada Mordida</p>
        </header>

        <div class="main-grid">
            <!-- ===== COLUNA ESQUERDA: CARDÁPIO ===== -->
            <section class="coluna-cardapio">
                <h2 class="hidden-mobile" style="display:none;">Cardápio</h2>

                <div class="produto" data-preco="12.00" data-nome="Kit Base (4 unidades)">
                    <div class="info-produto">
                        <img class="foto-empada" src="https://via.placeholder.com/95/fdf2e9/d35400?text=Kit" alt="Kit Base">
                        <div>
                            <span class="nome-item">Kit Base (4 unidades)</span>
                            <span class="preco-item">R$ 12,00</span>
                        </div>
                    </div>
                    <div class="qty-selector">
                        <button class="btn-qty" onclick="alterarQtd(this, -1)">−</button>
                        <span class="qty-value">0</span>
                        <button class="btn-qty" onclick="alterarQtd(this, 1)">+</button>
                    </div>
                </div>

                <div class="produto" data-preco="16.00" data-nome="Kit Lanche (6 unidades)">
                    <div class="info-produto">
                        <img class="foto-empada" src="https://via.placeholder.com/95/fdf2e9/d35400?text=Kit" alt="Kit Lanche">
                        <div>
                            <span class="nome-item">Kit Lanche (6 unidades)</span>
                            <span class="preco-item">R$ 16,00</span>
                        </div>
                    </div>
                    <div class="qty-selector">
                        <button class="btn-qty" onclick="alterarQtd(this, -1)">−</button>
                        <span class="qty-value">0</span>
                        <button class="btn-qty" onclick="alterarQtd(this, 1)">+</button>
                    </div>
                </div>

                <div class="produto" data-preco="25.00" data-nome="Kit Família (10 unidades)">
                    <div class="info-produto">
                        <img class="foto-empada" src="https://via.placeholder.com/95/fdf2e9/d35400?text=Kit" alt="Kit Família">
                        <div>
                            <span class="nome-item">Kit Família (10 unidades)</span>
                            <span class="preco-item">R$ 25,00</span>
                        </div>
                    </div>
                    <div class="qty-selector">
                        <button class="btn-qty" onclick="alterarQtd(this, -1)">−</button>
                        <span class="qty-value">0</span>
                        <button class="btn-qty" onclick="alterarQtd(this, 1)">+</button>
                    </div>
                </div>
            </section>

            <!-- ===== COLUNA DIREITA: PEDIDO + ENTREGA ===== -->
            <aside class="coluna-pedido">
                <div class="total-box">
                    <span>TOTAL DO PEDIDO</span>
                    <span id="valor_total_exibido">R$ 0,00</span>
                </div>

                <div class="checkout-container">
                    <h3>Dados para Entrega</h3>

                    <input type="text" id="nome" placeholder="Seu Nome completo" required>
                    <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required>

                    <div class="tipo-endereco-container">
                        <button type="button" class="btn-tipo active" data-tipo="residencial" onclick="selecionarTipo(this)">Residencial</button>
                        <button type="button" class="btn-tipo" data-tipo="comercial" onclick="selecionarTipo(this)">Comercial</button>
                    </div>

                    <input type="text" id="endereco" placeholder="Endereço (Rua, número, bairro)" required>
                    <input type="text" id="referencia" placeholder="Ponto de referência (opcional)">

                    <select id="pagamento" onchange="verificarTroco()">
                        <option value="">Forma de Pagamento</option>
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="PicPay">PicPay</option>
                        <option value="Cartão na entrega">Cartão na entrega</option>
                    </select>

                    <div id="box_troco">
                        <input type="text" id="troco" placeholder="Troco para quanto? (R$)">
                    </div>
                </div>

                <button class="btn-finalizar" onclick="enviarPedido()">Enviar Pedido pelo WhatsApp</button>
            </aside>
        </div>

        <footer>© 2026 Sabor de Infância - Serra, ES</footer>
    </div>

    <script>
        // ⚠️ TROQUE PELO SEU NÚMERO DE WHATSAPP (formato: 55 + DDD + número, só dígitos)
        const WHATSAPP = '5527999999999';

        function alterarQtd(btn, delta) {
            const selector = btn.parentElement;
            const span = selector.querySelector('.qty-value');
            let qtd = parseInt(span.textContent) + delta;
            if (qtd < 0) qtd = 0;
            span.textContent = qtd;
            atualizarTotal();
        }

        function atualizarTotal() {
            let total = 0;
            document.querySelectorAll('.produto').forEach(p => {
                const preco = parseFloat(p.dataset.preco);
                const qtd = parseInt(p.querySelector('.qty-value').textContent);
                total += preco * qtd;
            });
            document.getElementById('valor_total_exibido').textContent =
                'R$ ' + total.toFixed(2).replace('.', ',');
        }

        function selecionarTipo(btn) {
            document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function verificarTroco() {
            const pag = document.getElementById('pagamento').value;
            const box = document.getElementById('box_troco');
            if (pag === 'Dinheiro') box.classList.add('show');
            else box.classList.remove('show');
        }

        function enviarPedido() {
            const itens = [];
            let total = 0;
            document.querySelectorAll('.produto').forEach(p => {
                const qtd = parseInt(p.querySelector('.qty-value').textContent);
                if (qtd > 0) {
                    const preco = parseFloat(p.dataset.preco);
                    const nome = p.dataset.nome;
                    itens.push(`• ${qtd}x ${nome} — R$ ${(preco * qtd).toFixed(2).replace('.', ',')}`);
                    total += preco * qtd;
                }
            });

            if (itens.length === 0) {
                alert('Adicione pelo menos 1 item ao pedido!');
                return;
            }

            const nome = document.getElementById('nome').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            const referencia = document.getElementById('referencia').value.trim();
            const pagamento = document.getElementById('pagamento').value;
            const troco = document.getElementById('troco').value.trim();
            const tipo = document.querySelector('.btn-tipo.active').dataset.tipo;

            if (!nome || !telefone || !endereco || !pagamento) {
                alert('Preencha nome, telefone, endereço e forma de pagamento!');
                return;
            }

            let msg = `*🥟 NOVO PEDIDO — Sabor de Infância*\n\n`;
            msg += `*Itens:*\n${itens.join('\n')}\n\n`;
            msg += `*Total:* R$ ${total.toFixed(2).replace('.', ',')}\n\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Telefone:* ${telefone}\n`;
            msg += `*Tipo:* ${tipo}\n`;
            msg += `*Endereço:* ${endereco}\n`;
            if (referencia) msg += `*Referência:* ${referencia}\n`;
            msg += `*Pagamento:* ${pagamento}`;
            if (pagamento === 'Dinheiro' && troco) msg += ` (troco para R$ ${troco})`;

            const url = `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
