<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Infância - Delivery</title>
    <style>
        :root {
            --primary: #d35400;
            --primary-light: #fff3e0;
            --secondary: #27ae60;
            --text: #4e342e;
            --bg: #eaddcf;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
            margin: 0;
            min-height: 100vh;
        }

        .app-container {
            background-color: #fffaf5;
            width: 100%;
            max-width: 500px;
            padding: 30px 15px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            border: 1px solid #d7ccc8;
            box-sizing: border-box;
            overflow: hidden;
        }

        header { 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 2px dashed #d7ccc8;
        }

        .logo-placeholder img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            margin-top: 5px;
            color: #8d6e63;
            font-style: italic;
            font-size: 0.85rem;
        }

        .produto {
            background: white;
            margin: 15px auto;
            padding: 15px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            transition: transform 0.3s;
            border: 1px solid #fdf2e9;
        }

        .info-produto {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .foto-empada {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .nome-item {
            display: block;
            font-weight: 700;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .preco-item {
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
        }

        .qty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 50px;
        }

        .btn-qty {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-qty:active { transform: scale(0.9); }

        .qty-value {
            font-weight: bold;
            min-width: 20px;
            color: var(--text);
        }

        .total-box {
            background: var(--primary-light);
            color: var(--text);
            margin: 25px 0;
            padding: 20px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px dashed var(--primary);
        }

        #valor_total_exibido {
            color: var(--secondary);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .checkout-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            margin: 20px 0;
            padding: 20px;
            border-radius: 30px;
            text-align: left;
            border: 1px solid white;
        }

        .checkout-container h3 {
            color: var(--primary);
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .tipo-endereco-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-tipo {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: var(--text);
            transition: all 0.3s;
        }

        .btn-tipo.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .endereco-campos {
            display: none;
            animation: fadeIn 0.4s ease-in;
        }

        .checkout-container input, .checkout-container select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 15px;
            box-sizing: border-box;
            background: white;
            font-size: 14px;
            outline: none;
        }

        #box_troco {
            display: none;
            margin-top: 5px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button.btn-finalizar {
            background: linear-gradient(135deg, var(--secondary), #2ecc71);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
            transition: all 0.3s;
            border-bottom: 4px solid #1e8449;
        }

        button.btn-finalizar:active {
            transform: translateY(4px);
            border-bottom: 0;
        }

        footer { margin-top: 30px; font-size: 0.75rem; color: #bcaaa4; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo-placeholder">
                <img src="logo_nova.png" alt="Logo Sabor de Infância">
            </div>
            <h1>Delivery</h1>
            <p class="subtitle">Doces Recordações em cada Mordida</p>
        </header>

        <div class="produto">
            <div class="info-produto">
               <img src="kit_4_empadas.png" class="foto-empada">
               <div>
                   <span class="nome-item">Kit Base (4 unidades)</span>
                   <span class="preco-item">R$ 12,00</span>
               </div>
            </div>
            <div class="qty-selector">
                <button class="btn-qty" onclick="changeQty('qtd_base', -1)">-</button>
                <span class="qty-value" id="val_qtd_base">0</span>
                <button class="btn-qty" onclick="changeQty('qtd_base', 1)">+</button>
            </div>
            <input type="hidden" id="qtd_base" value="0">
        </div>

        <div class="produto">
            <div class="info-produto">
                <img src="kit_6_empadas.png" class="foto-empada">
                <div>
                    <span class="nome-item">Kit Lanche (6 unidades)</span>
                    <span class="preco-item">R$ 16,00</span>
                </div>
            </div>
            <div class="qty-selector">
                <button class="btn-qty" onclick="changeQty('qtd_lanche', -1)">-</button>
                <span class="qty-value" id="val_qtd_lanche">0</span>
                <button class="btn-qty" onclick="changeQty('qtd_lanche', 1)">+</button>
            </div>
            <input type="hidden" id="qtd_lanche" value="0">
        </div>

        <div class="produto">
            <div class="info-produto">
                <img src="kit_10_empadas.png" class="foto-empada">
                <div>
                    <span class="nome-item">Kit Família (10 unidades)</span>
                    <span class="preco-item">R$ 25,00</span>
                </div>
            </div>
            <div class="qty-selector">
                <button class="btn-qty" onclick="changeQty('qtd_familia', -1)">-</button>
                <span class="qty-value" id="val_qtd_familia">0</span>
                <button class="btn-qty" onclick="changeQty('qtd_familia', 1)">+</button>
            </div>
            <input type="hidden" id="qtd_familia" value="0">
        </div>

        <div class="total-box">
            <span>TOTAL DO PEDIDO</span>
            <span id="valor_total_exibido">R$ 0,00</span>
        </div>

        <div class="checkout-container">
            <h3>Dados para Entrega</h3>
            
            <input type="text" id="nome_cliente" placeholder="Seu Nome completo">
            
            <div class="tipo-endereco-container">
                <button class="btn-tipo" id="btn-residencial" onclick="setTipoEndereco('residencial')">Residencial</button>
                <button class="btn-tipo" id="btn-comercial" onclick="setTipoEndereco('comercial')">Comercial</button>
            </div>

            <div id="campos-residencial" class="endereco-campos">
                <input type="text" id="condominio" placeholder="Rua / Nome do Condomínio">
                <input type="text" id="casa_apto" placeholder="Nº Casa / Apartamento">
                <input type="text" id="complemento_res" placeholder="Bloco, Torre, Andar...">
            </div>

            <div id="campos-comercial" class="endereco-campos">
                <input type="text" id="empresa" placeholder="Nome da Empresa / Prédio">
                <input type="text" id="rua_comercial" placeholder="Rua e Número">
                <input type="text" id="sala_setor" placeholder="Sala, Andar ou Setor">
            </div>
            
            <select id="pagamento" onchange="verificarTroco()">
                <option value="" disabled selected>Forma de Pagamento</option>
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="PicPay">PicPay</option>
            </select>

            <div id="box_troco">
                <input type="text" id="valor_troco" placeholder="Troco para quanto?">
            </div>
        </div>

        <button class="btn-finalizar" onclick="finalizar()">ENVIAR PEDIDO PELO WHATSAPP</button>

        <footer>© 2026 Sabor de Infância - Serra, ES</footer>
    </div>

    <script>
        let tipoEnderecoAtual = '';

        function setTipoEndereco(tipo) {
            tipoEnderecoAtual = tipo;
            document.querySelectorAll('.btn-tipo').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.endereco-campos').forEach(div => div.style.display = 'none');
            
            document.getElementById('btn-' + tipo).classList.add('active');
            document.getElementById('campos-' + tipo).style.display = 'block';
        }

        function changeQty(id, delta) {
            const input = document.getElementById(id);
            const display = document.getElementById('val_' + id);
            let newVal = parseInt(input.value) + delta;
            if (newVal < 0) newVal = 0;
            input.value = newVal;
            display.innerText = newVal;
            atualizarTotal();
        }

        function atualizarTotal() {
            const qtdBase = parseInt(document.getElementById('qtd_base').value) || 0;
            const qtdLanche = parseInt(document.getElementById('qtd_lanche').value) || 0;
            const qtdFamilia = parseInt(document.getElementById('qtd_familia').value) || 0;
            const total = (qtdBase * 12.00) + (qtdLanche * 16.90) + (qtdFamilia * 25.00);
            const totalFormatado = total.toFixed(2).replace('.', ',');
            document.getElementById('valor_total_exibido').innerText = `R$ ${totalFormatado}`;
            return totalFormatado;
        }

        function verificarTroco() {
            const pgto = document.getElementById('pagamento').value;
            const boxTroco = document.getElementById('box_troco');
            if (pgto === "Dinheiro") {
                boxTroco.style.display = "block";
            } else {
                boxTroco.style.display = "none";
                document.getElementById('valor_troco').value = "";
            }
        }

        function finalizar() {
            const telefone = "5527992024698"; 
            
            const qtdBase = document.getElementById('qtd_base').value;
            const qtdLanche = document.getElementById('qtd_lanche').value;
            const qtdFamilia = document.getElementById('qtd_familia').value;
            const nome = document.getElementById('nome_cliente').value;
            const pgto = document.getElementById('pagamento').value;
            const troco = document.getElementById('valor_troco').value;
            const totalPedido = atualizarTotal();

            if (qtdBase == 0 && qtdLanche == 0 && qtdFamilia == 0) {
                alert("Por favor, selecione pelo menos um item.");
                return;
            }

            if (!nome || !tipoEnderecoAtual || !pgto) {
                alert("Por favor, preencha o nome, selecione o tipo de endereço e a forma de pagamento!");
                return;
            }

            let mensagem = `*NOVO PEDIDO - SABOR DE INFÂNCIA*\n\n`;
            mensagem += `👤 *Cliente:* ${nome}\n`;
            
            if (tipoEnderecoAtual === 'residencial') {
                const cond = document.getElementById('condominio').value;
                const casa = document.getElementById('casa_apto').value;
                const comp = document.getElementById('complemento_res').value;
                mensagem += `🏠 *Tipo:* Residencial\n`;
                mensagem += `🏢 *Condomínio:* ${cond}\n`;
                mensagem += `🏠 *Nº:* ${casa}\n`;
                if (comp) mensagem += `📍 *Comp:* ${comp}\n`;
            } else {
                const emp = document.getElementById('empresa').value;
                const rua = document.getElementById('rua_comercial').value;
                const sala = document.getElementById('sala_setor').value;
                mensagem += `💼 *Tipo:* Comercial\n`;
                mensagem += `🏢 *Empresa:* ${emp}\n`;
                mensagem += `📍 *Endereço:* ${rua}\n`;
                if (sala) mensagem += `Door *Sala/Setor:* ${sala}\n`;
            }
            
            let infoPgto = `💳 *Pagamento:* ${pgto}`;
            if (pgto === "Dinheiro" && troco) {
                infoPgto += ` (Troco para R$ ${troco})`;
            }
            mensagem += infoPgto + `\n\n`;
            
            mensagem += `--- *ITENS DO PEDIDO* ---\n`;
            if (qtdBase > 0) mensagem += `• ${qtdBase}x Kit Base (4 unidades)\n`;
            if (qtdLanche > 0) mensagem += `• ${qtdLanche}x Kit Lanche (6 unidades)\n`;
            if (qtdFamilia > 0) mensagem += `• ${qtdFamilia}x Kit Família (10 unidades)\n\n`;

            mensagem += `💰 *VALOR TOTAL: R$ ${totalPedido}*`;

            window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }
    </script>
</body>
</html>
